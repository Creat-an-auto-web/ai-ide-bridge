<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1760" viewBox="0 0 1600 1760">
  <defs>
    <style>
      .title { font: 700 34px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .node-title { font: 700 22px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .node-text { font: 500 18px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .edge { stroke: #334155; stroke-width: 4; fill: none; }
      .label { font: 600 18px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1600" height="1760" fill="#f7f5ef"/>
  <text x="800" y="64" text-anchor="middle" class="title">Requirement Analysis 总体流程图</text>
  <text x="800" y="96" text-anchor="middle" class="subtitle">聚焦 4 个子主题：User Story 标准化、组合合理性验证、用户反馈协议、多轮继续优化</text>

  <rect x="520" y="130" rx="22" ry="22" width="560" height="92" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
  <text x="800" y="176" text-anchor="middle" class="node-title">1. 原始需求输入</text>
  <text x="800" y="204" text-anchor="middle" class="node-text">接收 user_prompt / task_id / mode</text>

  <rect x="520" y="286" rx="22" ry="22" width="560" height="110" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
  <text x="800" y="334" text-anchor="middle" class="node-title">2. 工作区上下文整理</text>
  <text x="800" y="362" text-anchor="middle" class="node-text">收集 workspace_summary / active_file / diagnostics</text>
  <text x="800" y="388" text-anchor="middle" class="node-text">recent_test_failures / execution_constraints</text>

  <rect x="520" y="460" rx="22" ry="22" width="560" height="118" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
  <text x="800" y="508" text-anchor="middle" class="node-title">3. 首轮需求分析生成</text>
  <text x="800" y="536" text-anchor="middle" class="node-text">输出 RequirementSpec</text>
  <text x="800" y="562" text-anchor="middle" class="node-text">capability_groups + story_units</text>

  <rect x="520" y="642" rx="22" ry="22" width="560" height="118" fill="#fff7d6" stroke="#8a6d1d" stroke-width="3"/>
  <text x="800" y="690" text-anchor="middle" class="node-title">4. User Story 结构与内容校验</text>
  <text x="800" y="718" text-anchor="middle" class="node-text">校验 story_kind / when_context / business_outcome</text>
  <text x="800" y="744" text-anchor="middle" class="node-text">拒绝功能名伪 story 与技术任务伪 story</text>

  <polygon points="800,818 980,930 800,1042 620,930" fill="#fff7d6" stroke="#8a6d1d" stroke-width="3"/>
  <text x="800" y="914" text-anchor="middle" class="node-title">5. 单轮需求验证</text>
  <text x="800" y="944" text-anchor="middle" class="node-text">检查粒度、AC、依赖、</text>
  <text x="800" y="970" text-anchor="middle" class="node-text">capability 与 story 对齐</text>

  <rect x="1080" y="878" rx="18" ry="18" width="320" height="106" fill="#fdecea" stroke="#a94442" stroke-width="3"/>
  <text x="1240" y="924" text-anchor="middle" class="node-title">暂停并等待人工介入</text>
  <text x="1240" y="952" text-anchor="middle" class="node-text">verification = blocked</text>

  <rect x="170" y="878" rx="18" ry="18" width="290" height="106" fill="#e8f4ff" stroke="#1e5b8f" stroke-width="3"/>
  <text x="315" y="924" text-anchor="middle" class="node-title">生成 revision_focus</text>
  <text x="315" y="952" text-anchor="middle" class="node-text">verification = revise</text>

  <polygon points="800,1126 990,1244 800,1362 610,1244" fill="#e8f8ea" stroke="#2e7d32" stroke-width="3"/>
  <text x="800" y="1226" text-anchor="middle" class="node-title">6. 组合合理性验证</text>
  <text x="800" y="1256" text-anchor="middle" class="node-text">检查 story 集合是否形成</text>
  <text x="800" y="1282" text-anchor="middle" class="node-text">主路径 / 权限 / 失败 / E2E 闭环</text>

  <rect x="170" y="1192" rx="18" ry="18" width="290" height="106" fill="#e8f4ff" stroke="#1e5b8f" stroke-width="3"/>
  <text x="315" y="1238" text-anchor="middle" class="node-title">生成 revision_focus</text>
  <text x="315" y="1266" text-anchor="middle" class="node-text">composition = revise</text>

  <rect x="520" y="1438" rx="22" ry="22" width="560" height="114" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
  <text x="800" y="1486" text-anchor="middle" class="node-title">7. 等待用户决定</text>
  <text x="800" y="1514" text-anchor="middle" class="node-text">接受当前结果 / 继续优化 / 补充反馈</text>
  <text x="800" y="1540" text-anchor="middle" class="node-text">状态：paused_converged / paused_stalled / paused_blocked</text>

  <rect x="160" y="1600" rx="18" ry="18" width="320" height="108" fill="#e8f4ff" stroke="#1e5b8f" stroke-width="3"/>
  <text x="320" y="1648" text-anchor="middle" class="node-title">global_feedback</text>
  <text x="320" y="1676" text-anchor="middle" class="node-text">追加范围、约束、优先级</text>

  <rect x="640" y="1600" rx="18" ry="18" width="320" height="108" fill="#e8f4ff" stroke="#1e5b8f" stroke-width="3"/>
  <text x="800" y="1648" text-anchor="middle" class="node-title">story_feedback</text>
  <text x="800" y="1676" text-anchor="middle" class="node-text">针对单条 story 修订拆分或 AC</text>

  <rect x="1120" y="1600" rx="18" ry="18" width="320" height="108" fill="#e8f8ea" stroke="#2e7d32" stroke-width="3"/>
  <text x="1280" y="1648" text-anchor="middle" class="node-title">进入下一阶段</text>
  <text x="1280" y="1676" text-anchor="middle" class="node-text">用户接受当前需求分析结果</text>

  <path class="edge" marker-end="url(#arrow)" d="M800 222 L800 286"/>
  <path class="edge" marker-end="url(#arrow)" d="M800 396 L800 460"/>
  <path class="edge" marker-end="url(#arrow)" d="M800 578 L800 642"/>
  <path class="edge" marker-end="url(#arrow)" d="M800 760 L800 818"/>
  <path class="edge" marker-end="url(#arrow)" d="M980 930 L1080 930"/>
  <text x="1024" y="918" class="label">blocked</text>
  <path class="edge" marker-end="url(#arrow)" d="M620 930 L460 930"/>
  <text x="494" y="918" class="label">revise</text>
  <path class="edge" marker-end="url(#arrow)" d="M800 1042 L800 1126"/>
  <text x="828" y="1088" class="label">pass</text>
  <path class="edge" marker-end="url(#arrow)" d="M610 1244 L460 1244"/>
  <text x="492" y="1232" class="label">revise</text>
  <path class="edge" marker-end="url(#arrow)" d="M990 1244 L1080 930"/>
  <text x="1012" y="1106" class="label">blocked</text>
  <path class="edge" marker-end="url(#arrow)" d="M800 1362 L800 1438"/>
  <text x="828" y="1404" class="label">pass</text>
  <path class="edge" marker-end="url(#arrow)" d="M680 1552 L400 1600"/>
  <text x="490" y="1568" class="label">追加全局反馈</text>
  <path class="edge" marker-end="url(#arrow)" d="M800 1552 L800 1600"/>
  <text x="826" y="1576" class="label">针对 story 提意见</text>
  <path class="edge" marker-end="url(#arrow)" d="M920 1552 L1220 1600"/>
  <text x="1060" y="1570" class="label">接受</text>
  <path class="edge" marker-end="url(#arrow)" d="M320 1600 L315 984"/>
  <path class="edge" marker-end="url(#arrow)" d="M800 1600 L315 984"/>
  <text x="410" y="1098" class="label">映射回 revision_focus</text>
</svg>
